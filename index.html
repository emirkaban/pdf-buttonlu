<!DOCTYPE html>
<html lang="tr">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <!-- PWA ve Safari Mobil Ayarları -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mali Takip">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135706.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* LOADER RING - PREMIUM */
.loader-ring {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: conic-gradient(
        #3b82f6,
        #06b6d4,
        #9333ea,
        #3b82f6
    );
    animation: spinGlow 1.2s linear infinite;
    position: relative;
    box-shadow: 0 0 25px rgba(59, 130, 246, 0.6);
}

.loader-ring::before {
    content: "";
    position: absolute;
    inset: 6px;
    background: #0f172a;
    border-radius: 50%;
}

/* DÖNÜŞ */
@keyframes spinGlow {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
        #loader {
    position: fixed;
    inset: 0;
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.5s ease;
}

#loader.hidden {
    opacity: 0;
}
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: contain;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .active { animation: slideIn 0.2s ease-out; }

        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f172a;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #1e293b;
            z-index: 100;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        .nav-item {
            color: #94a3b8;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            background: none;
            border: none;
            outline: none;
        }
        .nav-item.active {
            color: #3b82f6;
        }
        .client-card:active {
            background-color: #f8fafc;
            transform: scale(0.98);
        }

        /* Otomatik Tamamlama Stilleri */
        #autocomplete-list {
            position: absolute;
            z-index: 1000;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            margin-top: 4px;
        }
        .autocomplete-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:active { background: #f1f5f9; }
        .loader-text {
    color: white;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 4px;
    animation: glowText 2s ease-in-out infinite alternate;
}

/* PARLAMA EFEKTİ */
@keyframes glowText {
    0% {
        text-shadow:
            0 0 5px #3b82f6,
            0 0 10px #3b82f6,
            0 0 20px #3b82f6;
        opacity: 0.8;
    }
    100% {
        text-shadow:
            0 0 10px #60a5fa,
            0 0 20px #60a5fa,
            0 0 40px #60a5fa;
        opacity: 1;
    }
}
#loader::after {
    content: "";
    position: absolute;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(59,130,246,0.3), transparent);
    filter: blur(60px);
}
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-32">

    <!-- Üst Bar -->

    <div class="max-w-6xl mx-auto p-4">
        
        <!-- 1. ÖZET PANELİ -->

                    </div>

                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs font-bold text-slate-400 uppercase">Toplam Tahsilat</span>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <div class="flex justify-between items-center">
                    <div class="flex justify-between items-center">
    <h2 id="det-client-name" class="font-black text-xl text-slate-800 tracking-tight">Müşteri Adı</h2>

    <button onclick="pdfOlustur()" 
        class="bg-red-500 text-white text-xs px-3 py-2 rounded-xl font-bold shadow">

    </button>
</div>
                    <span class="bg-blue-100 text-blue-700 text-[10px] font-black px-3 py-1 rounded-full uppercase">Mükellef Kartı</span>

                        <div class="text-[9px] font-bold text-amber-600 uppercase">Bakiye</div>

        </button>
        <button onclick="switchTab('transactions')" id="nav-transactions" class="nav-item">

        </button>

            <span>Ekle</span>
        </button>

    <script>
        // Veri Yapısı
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [
            { id: 1, client: 'FERHAT DOĞAN', receiptNo: '2025 DEVİR', date: '2026-01-01', receivable: 77000, paid: 0 },
            { id: 2, client: 'FERHAT DOĞAN', receiptNo: 'ONR2026000000001', date: '2026-01-05', receivable: 4500, paid: 0 },
            { id: 3, client: 'MARSUP KUMANYACILIK', receiptNo: 'ONR2026000000002', date: '2026-01-05', receivable: 10000, paid: 0 }
        ];

        function save() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
            render();

        }

        const formatTRY = (val) => new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(val || 0);

        // OTOMATİK TAMAMLAMA MANTIĞI
        function handleAutocomplete(val) {
            const listEl = document.getElementById('autocomplete-list');
            if (!val || val.length < 1) {
                listEl.classList.add('hidden');
                return;
            }

            // Mevcut mükellef isimlerini benzersiz bir liste olarak al
            const existingNames = [...new Set(transactions.map(t => t.client.toUpperCase()))];
            const filtered = existingNames.filter(name => name.includes(val.toUpperCase()));

            if (filtered.length > 0) {
                listEl.innerHTML = filtered.map(name => `
                    <div class="autocomplete-item" onmousedown="selectClient('${name}')">
                        ${name}
                    </div>
                `).join('');
                listEl.classList.remove('hidden');
            } else {
                listEl.classList.add('hidden');
            }
        }

        function selectClient(name) {
            document.getElementById('form-client').value = name;
            document.getElementById('autocomplete-list').classList.add('hidden');
        }

        function hideAutocomplete() {
            // Gecikmeli kapatıyoruz ki tıklama olayı (onmousedown) önce çalışsın
            setTimeout(() => {
                document.getElementById('autocomplete-list').classList.add('hidden');
            }, 200);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            
            const navBtn = document.getElementById('nav-' + tabId);
            if(navBtn) navBtn.classList.add('active');

            if(tabId === 'client-detail') {
                document.getElementById('header-normal').classList.add('hidden');
                document.getElementById('header-detail').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.add('opacity-50');
            } else {
                document.getElementById('header-normal').classList.remove('hidden');
                document.getElementById('header-detail').classList.add('hidden');
                document.getElementById('bottom-nav').classList.remove('opacity-50');
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (window.navigator.vibrate) window.navigator.vibrate(5);
        }

        function openClientDetail(clientName) {
            const clientData = transactions.filter(t => t.client.toUpperCase() === clientName.toUpperCase());
            const summary = clientData.reduce((acc, t) => {
                acc.rec += Number(t.receivable || 0);
                acc.paid += Number(t.paid || 0);
                return acc;
            }, {rec: 0, paid: 0});

            document.getElementById('det-client-name').innerText = clientName;
            document.getElementById('det-total-rec').innerText = formatTRY(summary.rec);
            document.getElementById('det-total-paid').innerText = formatTRY(summary.paid);
            document.getElementById('det-total-bal').innerText = formatTRY(summary.rec - summary.paid);

            const detList = document.getElementById('det-transactions-list');
            detList.innerHTML = clientData.sort((a,b) => new Date(b.date) - new Date(a.date)).map(t => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                    <div>
                        <div class="text-[10px] text-slate-400 font-black uppercase mb-1">${new Date(t.date).toLocaleDateString('tr-TR')}</div>
                        <div class="font-bold text-slate-800 text-sm">${t.receiptNo}</div>
                    </div>
                    <div class="text-right">
                        <div class="font-black text-sm ${t.paid > 0 ? 'text-emerald-600' : 'text-blue-600'}">
                            ${t.paid > 0 ? '+' + formatTRY(t.paid) : formatTRY(t.receivable)}
                        </div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase">${t.paid > 0 ? 'TAHSİLAT' : 'TAHAKKUK'}</div>
                    </div>
                </div>
            `).join('');

            switchTab('client-detail');
        }

        function render() {
            const totals = transactions.reduce((acc, t) => {
                acc.rec += Number(t.receivable || 0);
                acc.paid += Number(t.paid || 0);
                return acc;
            }, {rec: 0, paid: 0});

            document.getElementById('total-receivable').innerText = formatTRY(totals.rec);
            document.getElementById('total-paid').innerText = formatTRY(totals.paid);
            document.getElementById('total-balance').innerText = formatTRY(totals.rec - totals.paid);
            
            const perc = totals.rec > 0 ? (totals.paid / totals.rec * 100).toFixed(1) : 0;
            document.getElementById('progress-bar').style.width = perc + '%';
            document.getElementById('progress-percent').innerText = `%${perc}`;

            const tList = document.getElementById('transactions-list');
            tList.innerHTML = transactions.sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 50).map(t => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center transaction-card">
                    <div class="flex items-center space-x-3">
                        <div class="w-9 h-9 rounded-full ${t.paid > 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-blue-50 text-blue-600'} flex items-center justify-center">
                            <i class="fas ${t.paid > 0 ? 'fa-arrow-down' : 'fa-arrow-up'} text-[10px]"></i>
                        </div>
                        <div>
                            <div class="font-bold text-slate-800 text-sm leading-tight">${t.client}</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase">${new Date(t.date).toLocaleDateString('tr-TR')}</div>
                        </div>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <div class="font-black text-sm ${t.paid > 0 ? 'text-emerald-600' : 'text-blue-600'}">
                            ${t.paid > 0 ? formatTRY(t.paid) : formatTRY(t.receivable)}
                        </div>
                        <button onclick="deleteRecord(${t.id})" class="text-slate-200 hover:text-red-400 mt-1"><i class="fas fa-trash-alt text-[10px]"></i></button>
                    </div>
                </div>
            `).join('');

            const clients = {};
            transactions.forEach(t => {
                const n = t.client.toUpperCase();
                if(!clients[n]) clients[n] = { name: n, rec: 0, paid: 0 };
                clients[n].rec += Number(t.receivable || 0);
                clients[n].paid += Number(t.paid || 0);
            });

            document.getElementById('clients-list').innerHTML = Object.values(clients).sort((a,b) => (b.rec-b.paid) - (a.rec-a.paid)).map(c => `
                <div onclick="openClientDetail('${c.name}')" class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 client-card transition-all cursor-pointer flex justify-between items-center">
                    <div class="flex-1">
                        <div class="font-black text-slate-800 tracking-tight text-sm mb-1">${c.name}</div>
                        <div class="flex space-x-3 text-[9px] font-bold uppercase text-slate-400">
                            <span>T: ${formatTRY(c.rec)}</span>
                            <span class="text-emerald-500">Ö: ${formatTRY(c.paid)}</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="${c.rec-c.paid > 0 ? 'text-amber-600' : 'text-slate-400'} font-black text-xs">
                            ${formatTRY(c.rec - c.paid)}
                        </div>
                        <div class="text-[8px] text-slate-300 font-bold uppercase">BAKİYE</div>
                    </div>
                    <i class="fas fa-chevron-right text-slate-200 ml-4 text-xs"></i>
                </div>
            `).join('');
        }

        function addRecord(e) {
            e.preventDefault();
            const newT = {
                id: Date.now(),
                client: document.getElementById('form-client').value.toUpperCase().trim(),
                receiptNo: document.getElementById('form-receipt').value || 'BELGESİZ',
                date: document.getElementById('form-date').value,
                receivable: Number(document.getElementById('form-receivable').value) || 0,
                paid: Number(document.getElementById('form-paid').value) || 0
            };
            transactions.push(newT);
            e.target.reset();
            document.getElementById('form-date').valueAsDate = new Date();
            save();
            switchTab('transactions');
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }

        function deleteRecord(id) {
            if(confirm('Bu işlemi silmek istediğinize emin misiniz?')) {
                transactions = transactions.filter(t => t.id !== id);
                save();
            }
        }

        function filterTransactions(val) {
            const cards = document.querySelectorAll('.transaction-card');
            cards.forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(val.toLowerCase()) ? 'flex' : 'none';
            });
        }

        function filterClients(val) {
            const cards = document.querySelectorAll('.client-card');
            cards.forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(val.toLowerCase()) ? 'flex' : 'none';
            });
        }

        function exportData() {
            const dataStr = JSON.stringify(transactions, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SMMM_Mali_Takip_Yedek.json`;
            a.click();
        }

        document.getElementById('form-date').valueAsDate = new Date();
        render();
        window.addEventListener("load", () => {
    const loader = document.getElementById("loader");

    setTimeout(() => {
        loader.classList.add("hidden");

        setTimeout(() => {
            loader.remove();
        }, 500);

    }, 1500);
});
function pdfOlustur() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // 👇 BURAYA EKLENİYOR
    doc.addFileToVFS("Roboto-Regular.ttf", font);
    doc.addFont("Roboto-Regular.ttf", "Roboto", "normal");
    doc.setFont("Roboto");

    const clientName = document.getElementById('det-client-name').innerText;

    const clientData = transactions.filter(t => 
        t.client.toUpperCase() === clientName.toUpperCase()
    );

    let totalRec = 0;
    let totalPaid = 0;

    const tableData = clientData.map(t => {
        totalRec += Number(t.receivable || 0);
        totalPaid += Number(t.paid || 0);

        return [
            new Date(t.date).toLocaleDateString('tr-TR'),
            t.receiptNo,
            t.receivable > 0 ? formatTRY(t.receivable) : "-",
            t.paid > 0 ? formatTRY(t.paid) : "-"
        ];
    });

    // BAŞLIK
    doc.setFontSize(16);
    doc.text("Mükellef Ekstresi", 14, 15);

    doc.setFontSize(12);
    doc.text("Mükellef: " + clientName, 14, 25);

    // TABLO
    doc.autoTable({
        startY: 30,
        head: [["Tarih", "Belge No", "Tahakkuk", "Tahsilat"]],
        body: tableData
    });

    // ÖZET
    const finalY = doc.lastAutoTable.finalY + 10;

    doc.text("Toplam Tahakkuk: " + formatTRY(totalRec), 14, finalY);
    doc.text("Toplam Tahsilat: " + formatTRY(totalPaid), 14, finalY + 7);
    doc.text("Bakiye: " + formatTRY(totalRec - totalPaid), 14, finalY + 14);

    // İNDİR
    doc.save(clientName + "_ekstre.pdf");
}
    </script>
